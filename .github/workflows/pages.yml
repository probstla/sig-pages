name: Update Docs and Deploy Pages

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    # Skip bot commits (loop protection) and commits tagged with #nopagesupdate
    if: >
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '#nopagesupdate')
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Append commit entry to docs/commits.md
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: uv run python3 .github/scripts/append_commit.py

      - name: Generate docs/index.html from all Markdown files
        run: uv run python3 .github/scripts/generate_html.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes – nothing to commit."
            exit 0
          fi
          git commit -m "chore: update docs #nopagesupdate"
          git push origin HEAD

  deploy:
    needs: update-docs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    # Allow only one concurrent deployment; do NOT cancel in-progress runs.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

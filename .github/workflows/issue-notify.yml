name: Notify SIG AI Members on New Issue

on:
  issues:
    types: [opened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  label-and-notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Ensure label exists and add it to issue
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'sig-ai-members-informed';

            // Create label if it doesn't exist yet
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: '0075ca',
                description: 'SIG AI members have been informed about this issue'
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });

      - name: Post initial issue guidance comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'This is a new issue, @maprobst please label the issue accordingly and provide an initial assessment.'
            });
